  /users/me/password:
    post:
      tags: [Users]
      summary: Change own password
      operationId: changeMyPassword
      security:
        - bearerAuth: []
      x-roles: [owner, subscriber]
      description: >
        Changes the authenticated user's password.
        Requires the current password for identity confirmation.
        Revokes all existing refresh tokens on success.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: Current password for identity confirmation
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 100
                  description: New password (8–100 chars)
      responses:
        "204":
          description: Password changed; all refresh tokens revoked.
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/me/email:
    patch:
      tags: [Users]
      summary: Change own email address
      operationId: changeMyEmail
      security:
        - bearerAuth: []
      x-roles: [owner, subscriber]
      description: >
        Changes the authenticated user's email address.
        Requires the current password for identity confirmation.
        Returns the updated user profile.
        The current JWT becomes invalid after the next token refresh.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newEmail]
              properties:
                currentPassword:
                  type: string
                  format: password
                  description: Current password for identity confirmation
                newEmail:
                  type: string
                  format: email
                  description: New email address
      responses:
        "200":
          description: Updated user profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Email already taken by another account.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

  /users/me/avatar:
    post:
