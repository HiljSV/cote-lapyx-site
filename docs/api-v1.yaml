  # ---------------------------------------------------------------------------
  # Admin — Comments
  # ---------------------------------------------------------------------------

  /admin/comments:
    get:
      tags: [Admin]
      summary: List all comments with moderation filter (owner only)
      operationId: adminListComments
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Returns all comments across all posts. Supports filtering by moderation status.
        Used by the admin panel's comments moderation section (filter tabs: Всі / Очікують / Спам).
      parameters:
        - name: status
          in: query
          required: false
          description: Filter by moderation status. Omit to return all statuses.
          schema:
            type: string
            enum: [pending, approved, rejected, spam, deleted]
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
      responses:
        "200":
          description: Paginated list of comments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedCommentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/comments/{id}:
    patch:
      tags: [Admin]
      summary: Moderate a comment — approve or reject (owner only)
      operationId: moderateComment
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Changes the moderation status of a comment to `approved` or `rejected`.
        Returns 409 if the comment is already in `deleted` status (terminal state).
        This endpoint is separate from `PATCH /comments/{id}`, which is for author edits.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentModerationRequest"
      responses:
        "200":
          description: Comment status updated. Returns the full CommentDTO with updated status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Comment is in a terminal state (deleted) and cannot be moderated.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

