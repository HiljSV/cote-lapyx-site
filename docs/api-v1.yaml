      responses:
        "200":
          description: Comment marked as seen. Returns updated CommentDTO.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

