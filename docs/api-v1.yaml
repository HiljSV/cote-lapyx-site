          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamMemberUpdateRequest"
      responses:
        "200":
          description: Updated team member profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMemberDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Posts
  # ---------------------------------------------------------------------------

  /posts:
    get:
      tags: [Posts]
      summary: List published blog posts
      operationId: listPosts
      security: []
      x-roles: [public]
      description: |
        Returns published posts. Owners see all statuses (draft, archived) when
        authenticated. Personal posts (`type=personal`) for a given author are also
        served here — filter with `?type=personal&authorId=<id>`.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
        - $ref: "#/components/parameters/AcceptLanguageHeader"
        - $ref: "#/components/parameters/LocaleParam"
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PostType"
        - name: authorId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: categorySlug
          in: query
          required: false
          schema:
            type: string
        - name: tagSlug
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          description: Full-text search query.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of blog posts (content field omitted).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedBlogPostResponse"

    post:
      tags: [Posts]
      summary: Create a new blog post (owner only)
      operationId: createPost
      security:
        - bearerAuth: []
      x-roles: [owner]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostCreateRequest"
      responses:
        "201":
          description: Post created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /posts/{slug}:
    get:
      tags: [Posts]
      summary: Get a single blog post by slug
      operationId: getPostBySlug
      security: []
      x-roles: [public]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
        - $ref: "#/components/parameters/AcceptLanguageHeader"
        - $ref: "#/components/parameters/LocaleParam"
      responses:
        "200":
          description: Full blog post including content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostDTO"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      tags: [Posts]
      summary: Replace a blog post (owner only)
      operationId: updatePost
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: Owner can only modify their own posts. Returns 403 if the authenticated owner is not the author.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogPostUpdateRequest"
      responses:
        "200":
          description: Updated post.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogPostDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Owner attempting to modify another owner's resource."
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      tags: [Posts]
      summary: Delete a blog post (owner only)
      operationId: deletePost
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: Owner can only modify their own posts. Returns 403 if the authenticated owner is not the author.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      responses:
        "204":
          description: Post deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Owner attempting to modify another owner's resource."
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Projects
