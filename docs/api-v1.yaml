  # ---------------------------------------------------------------------------

  /comments/{id}/seen:
    patch:
      tags: [Comments]
      summary: Mark a comment as seen by admin (owner only)
      operationId: markCommentSeen
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
