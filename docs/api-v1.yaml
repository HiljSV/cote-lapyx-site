  # ---------------------------------------------------------------------------
  # Admin Settings
  # ---------------------------------------------------------------------------

  /admin/settings:
    get:
      tags: [Admin]
      summary: Get site settings (owner only)
      operationId: getAdminSettings
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Returns the current site-wide configuration (site name, description, contact email,
        social links, registration toggle, maintenance mode, etc.).
      responses:
        "200":
          description: Site settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettingsDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags: [Admin]
      summary: Update site settings (owner only)
      operationId: updateAdminSettings
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Partially updates site-wide configuration. All fields are optional — only
        supplied fields are changed.

        **F064 — Maintenance mode + ETA:**
        Set `maintenanceMode: true` to activate soft maintenance mode.
        Optionally include `maintenanceUntil` with an ISO 8601 UTC timestamp so the
        frontend banner can display a localised countdown. `maintenanceUntil` uses
        partial-update semantics (omit/null = unchanged) and is cleared automatically
        when `maintenanceMode` is set to `false`.

        **Cache invalidation:** the backend maintains an in-memory cache of the
        maintenance flag and `maintenanceUntil` (TTL ≤ 10 s). A successful PATCH
        invalidates this cache immediately so `MaintenanceFilter` uses the updated
        values on the next request without a DB round-trip.

        **Owner bypass:** owners are never blocked by `MaintenanceFilter` — this
        endpoint is always reachable even when `maintenanceMode = true`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsUpdateRequest"
      responses:
        "200":
          description: Updated site settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettingsDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
