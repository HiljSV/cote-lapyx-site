        - $ref: "#/components/parameters/AcceptLanguageHeader"
        - $ref: "#/components/parameters/LocaleParam"
        - name: authorId
          in: query
          required: false
          description: Filter by team member (author) User PK.
          schema:
            type: integer
            format: int64
        - name: memberId
          in: query
          required: false
          description: |
            Filter to projects where the user (User PK) is either the AUTHOR or a
            COLLABORATOR. Takes priority over `authorId` when both parameters are
            supplied. Used by the member profile page to display all projects a
            team member was involved in, regardless of primary authorship.
          schema:
            type: integer
            format: int64
        - name: technology
          in: query
          required: false
          description: Filter projects that include this technology tag.
          schema:
            type: string
        - name: q
          in: query
          description: Full-text search query.
          required: false
          schema:
            type: string
