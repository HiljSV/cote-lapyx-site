  # ---------------------------------------------------------------------------
  # Comments
  # ---------------------------------------------------------------------------

  /posts/{slug}/comments:
    get:
      tags: [Comments]
      summary: List approved comments on a post
      operationId: listComments
      security: []
      x-roles: [public]
      description: |
        Returns approved comments. Owners see all statuses (pending, rejected, deleted) when
        authenticated. Deleted comments are always included in the response regardless of caller
        role. Subscribers see `content: null` with a localized `deletedMessage`; owners see the
        full original content. Both roles receive `deletedAt` and `status: "deleted"` on deleted
        comments.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
        - name: status
          in: query
          required: false
          description: |
            Filter comments by moderation status. Non-owner callers always receive
            only `approved` comments regardless of this parameter.
          schema:
            type: string
            enum: [pending, approved, rejected, deleted]
      responses:
        "200":
          description: Paginated list of comments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedCommentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Comments]
      summary: Add a comment to a post (subscriber or owner)
      operationId: createComment
      security:
        - bearerAuth: []
      x-roles: [owner, subscriber]
      description: |
        Submits a comment on the specified post.
        Before saving, the comment is passed through automatic moderation checks
        (profanity filter, hate-speech detection). If the content is rejected a 422
        is returned with a machine-readable `reason` field; the comment is NOT persisted.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "201":
          description: Comment submitted (may be pending human moderation).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Comment rejected by automatic moderation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/CommentRejectedProblem"
              example:
                type: https://cote-lapyx.com/problems/comment-rejected
                title: Comment Rejected
                status: 422
                detail: The comment was rejected by the automatic moderation filter.
                instance: /api/v1/posts/my-first-post/comments
                reason: profanity
        # F064: MaintenanceFilter blocks this write for non-owners when maintenanceMode=true.
        # Representative of all non-allowlisted POST / PUT / PATCH / DELETE endpoints.
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /comments/{id}:
    patch:
      tags: [Comments]
      summary: Edit a comment (author only)
      operationId: editComment
      security:
        - bearerAuth: []
      x-roles: [owner, subscriber]
      description: |
        Allows the comment author to update their comment text. The `updatedAt` field
        on the response is set to the time of this edit.

        Returns 403 if the authenticated user is not the comment author.
        Returns 404 if the comment does not exist or is not in APPROVED status.

        For owner moderation (approve / reject), use `PATCH /admin/comments/{id}`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentEditRequest"
      responses:
        "200":
          description: Comment updated. Returns the full CommentDTO with updatedAt populated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller is not the comment author.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: https://cote-lapyx.com/errors/forbidden
                title: Forbidden
                status: 403
                detail: You can only edit your own comments.
                instance: /api/v1/comments/42
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Comments]
      summary: Delete a comment (owner deletes any; subscriber deletes own)
      operationId: deleteComment
      security:
        - bearerAuth: []
      x-roles: [owner, subscriber]
      description: |
        Soft delete. Subscriber can delete their own comments regardless of status
        (pending or approved). Owner can delete any comment.
        The comment data is preserved in an audit log inaccessible to the subscriber.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Comment soft-deleted successfully. No content returned.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Subscriber attempting to delete another user's comment.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: https://cote-lapyx.com/errors/forbidden
                title: Forbidden
                status: 403
                detail: You can only delete your own comments.
                instance: /api/v1/comments/42
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Comment Likes (Sprint 4)
  # ---------------------------------------------------------------------------

  /comments/{id}/likes:
    get:
      tags: [Comments]
      summary: Get like count for a comment
      operationId: getCommentLikes
      # Public endpoint — no authentication required
      security: []
      x-roles: [public]
      description: |
        Returns the total like count for the specified comment.
        `likedByCurrentUser` is always `false` for unauthenticated requests.

      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 42
      responses:
        "200":
          description: Like count for the comment.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentLikeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Comments]
      summary: Like a comment (anonymous or authenticated)
      operationId: likeComment
      # Auth is optional — anonymous users may like without a token
      security:
        - bearerAuth: []
        - {}
      x-roles: [public, subscriber, owner]
      description: |
        Records a like for the specified comment.
        Authenticated users: like is attributed to the account (deduplicated per user).
        Anonymous users: like is attributed to the IP address (deduplicated per IP).
        Rate-limited to 20 requests/minute and 100 requests/hour per IP.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 42
      responses:
        "201":
          description: Like recorded. Returns updated count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentLikeResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Already liked (duplicate like from same user or IP).
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: https://cote-lapyx.com/errors/conflict
                title: Conflict
                status: 409
                detail: You have already liked this comment.
                instance: /api/v1/comments/42/likes
        "429":
          $ref: "#/components/responses/TooManyRequests"

    delete:
      tags: [Comments]
      summary: Unlike a comment (anonymous or authenticated)
      operationId: unlikeComment
      # Auth is optional — anonymous users may unlike without a token
      security:
        - bearerAuth: []
        - {}
      x-roles: [public, subscriber, owner]
      description: |
        Removes an existing like from the specified comment.
        Authenticated users: removes the like tied to the account.
        Anonymous users: removes the like tied to the IP address.
        Rate-limited to 20 requests/minute and 100 requests/hour per IP.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 42
      responses:
        "200":
          description: Like removed. Returns updated count.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentLikeResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ---------------------------------------------------------------------------
