    # --- Blog Post ---

    BlogPostDTO:
      type: object
      required: [id, slug, title, type, status, authorId, createdAt]
      properties:
        id:
          type: integer
          format: int64
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
          example: my-first-post
        title:
          type: string
          example: Перший пост
        type:
          $ref: "#/components/schemas/PostType"
        excerpt:
          type: string
          nullable: true
          maxLength: 500
        content:
          type: string
          nullable: true
          description: Full HTML/Markdown content. Omitted in list responses.
        coverImage:
          type: string
          format: uri
          nullable: true
        status:
          $ref: "#/components/schemas/PostStatus"
        publishedAt:
          type: string
          format: date-time
          nullable: true
        authorId:
          type: integer
          format: int64
        author:
          # Slim public representation — email/role/timestamps excluded (Sprint 5)
          $ref: "#/components/schemas/PublicUserDTO"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/CategoryDTO"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/TagDTO"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        # Sprint 4: like counters and current-user like state
        likesCount:
          type: integer
          format: int64
          description: "Total likes (registered + anonymous). Present in both list and detail responses."
          example: 47
        registeredLikesCount:
          type: integer
          format: int64
          nullable: true
          description: |
            Likes from registered users. Present in single-post detail responses only.
            Null in list responses to reduce payload size.
          example: 31
        anonymousLikesCount:
          type: integer
          format: int64
          nullable: true
          description: |
            Likes from anonymous visitors. Present in single-post detail responses only.
            Null in list responses to reduce payload size.
          example: 16
        likedByCurrentUser:
          type: boolean
          description: |
            True when the authenticated requester has liked this post.
            False for anonymous users and for unauthenticated requests.
          example: false
        # sources mirrors the content field: null in list responses, populated in single-post detail.
        sources:
          type: array
          nullable: true
          description: |
            Ordered list of source URLs or references rendered as the "Джерела" block on the
            post page. Order is significant — items appear in the order stored.
            **Null in list responses** (mirrors `content`). Populated only for single-post detail.
            Empty array means the post has no sources.
          items:
            type: string
            minLength: 1
            maxLength: 500
          example:
            - "https://spring.io/blog/2024/01/01/example"
            - "https://docs.oracle.com/en/java/"

    BlogPostCreateRequest:
      type: object
      required: [title, type, content]
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 255
        type:
          $ref: "#/components/schemas/PostType"
        excerpt:
          type: string
          maxLength: 500
          nullable: true
        content:
          type: string
          minLength: 1
        coverImage:
          type: string
          format: uri
          nullable: true
        status:
          $ref: "#/components/schemas/PostStatus"
          default: draft
        categoryIds:
          type: array
          items:
            type: integer
            format: int64
        tagIds:
          type: array
          items:
            type: integer
            format: int64
        # Optional ordered list of sources — @Size(max=20) on list, @NotBlank @Size(max=500) per element.
        sources:
          type: array
          nullable: true
          maxItems: 20
          description: |
            Ordered list of source URLs or references for the "Джерела" block.
            Order is significant — items are rendered in the order they appear here.
            Optional: omit or send `null` to create a post without sources.
            Each element must be non-blank and at most 500 characters.
            Constraints: `@Size(max=20)` on the list; `@NotBlank @Size(max=500)` per element.
          items:
            type: string
            minLength: 1
            maxLength: 500
            description: A source URL or reference string. Must not be blank.
          example:
            - "https://spring.io/blog/2024/01/01/example"
            - "https://docs.oracle.com/en/java/"

    BlogPostUpdateRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 255
        excerpt:
          type: string
          maxLength: 500
          nullable: true
        content:
          type: string
        coverImage:
          type: string
          format: uri
          nullable: true
        status:
          $ref: "#/components/schemas/PostStatus"
        categoryIds:
          type: array
          items:
            type: integer
            format: int64
        tagIds:
          type: array
          items:
            type: integer
            format: int64
        # Patch semantics: null → leave existing sources unchanged; [] → clear all sources.
        # Per-element constraints: @NotBlank @Size(max=500); list constraint: @Size(max=20).
        sources:
          type: array
          nullable: true
          maxItems: 20
          description: |
            Patch-semantics: omit or send `null` to leave existing sources unchanged.
            Send an empty array `[]` to clear all sources from the post.
            Order is significant — the stored order matches the order supplied here.
            Each element must be non-blank and at most 500 characters.
            Constraints: `@Size(max=20)` on the list; `@NotBlank @Size(max=500)` per element.
          items:
            type: string
            minLength: 1
            maxLength: 500
            description: A source URL or reference string. Must not be blank.
          example:
            - "https://spring.io/blog/2024/01/01/example"
            - "https://docs.oracle.com/en/java/"

    PagedBlogPostResponse:
      type: object
