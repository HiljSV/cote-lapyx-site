  # ---------------------------------------------------------------------------
  # Translations
  # ---------------------------------------------------------------------------

  /translations/{entityType}/{entityId}:
    get:
      tags: [Translations]
      summary: Get all translations for an entity
      operationId: getTranslations
      security: []
      x-roles: [public]
      description: Returns all locale-field-value triples for the specified entity.
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
            enum: [blog_post, project, team_member, category, tag]
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: locale
          in: query
          required: false
          description: Filter by a specific locale.
          schema:
            $ref: "#/components/schemas/Locale"
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      responses:
        "200":
          description: Array of translation entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TranslationDTO"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Translations]
      summary: Bulk upsert translations for an entity (owner only)
      operationId: bulkUpsertTranslations
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Upserts all translations for the given entity in a single request.
        Existing translations are overwritten; missing ones are created.

        **Partial-success semantics:** If some items in the request array are invalid, the
        valid items are persisted and the endpoint returns `207 Multi-Status` with a
        `TranslationBulkResponse` body containing both `saved` and `errors` arrays.
        `200` is returned only when every item was saved successfully.
        `400` is returned when no items could be saved (all invalid or request-level failure).
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
            enum: [blog_post, project, team_member, category, tag]
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationBulkRequest"
      responses:
        "200":
          description: All provided translations saved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TranslationDTO"
        "207":
          description: |
            Partial success — some translations saved, some rejected. Check the `errors` array
            for per-item failure details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslationBulkResponse"
        "400":
          description: All items invalid or request-level validation failure; nothing was saved.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /translations/{entityType}/{entityId}/{locale}/{field}:
    delete:
      tags: [Translations]
      summary: Delete a specific translation entry (owner only)
      operationId: deleteTranslation
      security:
        - bearerAuth: []
      x-roles: [owner]
      parameters:
        - name: entityType
          in: path
          required: true
          schema:
            type: string
            enum: [blog_post, project, team_member, category, tag]
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: locale
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Locale"
        - name: field
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Translation entry deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Contacts (company-level social / contact links) — FEAT-SOCIAL v1.9.0
  # ---------------------------------------------------------------------------
  # Public: GET /contacts — only enabled contacts, ordered by displayOrder ASC.
  # Admin:  GET/POST /admin/contacts
  #         GET/PATCH/DELETE /admin/contacts/{id}
  # ---------------------------------------------------------------------------

  /contacts:
    get:
      tags: [Contacts]
      summary: List enabled team contact links (public)
      operationId: listContacts
      # Public endpoint — no auth required
      security: []
      x-roles: [public]
      description: |
        Returns only the enabled company-level social / contact links for the team
        (Telegram, Instagram, LinkedIn, GitHub, Email, etc.), sorted by `displayOrder`
        ascending. Disabled links are excluded. No authentication required.

        Used by the site footer, hero CTA, and contact page to render the icon row.
      responses:
        "200":
          description: Ordered array of enabled contact links.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactDTO"

  /admin/contacts:
    get:
      tags: [Contacts]
      summary: List all contact links including disabled (owner only)
      operationId: adminListContacts
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Returns all company contact links regardless of `enabled` state, sorted by
        `displayOrder` ascending. Used by the admin panel to manage the full link set.
        Supports optional filtering by `enabled` state.
      parameters:
        - name: enabled
          in: query
          required: false
          description: Filter by enabled state. Omit to return all.
          schema:
            type: boolean
      responses:
        "200":
          description: Array of all contact links (enabled + disabled).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [Contacts]
      summary: Create a contact link (owner only)
      operationId: createContact
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Creates a new company contact link. The `type` field maps 1:1 to the existing
        `ContactType` enum on the `contacts` table. Duplicate types are allowed
        (e.g. two GitHub links with different labels) — no unique constraint on type alone.
        Returns 409 only if `value` is identical to an existing record.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
      responses:
        "201":
          description: Contact link created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: A contact with this exact value already exists.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
                type: https://cote-lapyx.com/errors/conflict
                title: Conflict
                status: 409
                detail: A contact link with this value already exists.
                instance: /api/v1/admin/contacts
        "422":
          $ref: "#/components/responses/ValidationError"

  /admin/contacts/{id}:
    get:
      tags: [Contacts]
      summary: Get a single contact link by ID (owner only)
      operationId: adminGetContact
      security:
        - bearerAuth: []
      x-roles: [owner]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 3
      responses:
        "200":
          description: Contact link detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Contacts]
      summary: Update a contact link (owner only)
      operationId: updateContact
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Partial update — all `ContactRequest` fields are optional.
        Toggling `enabled: false` hides the link from public `GET /contacts` without
        deleting it. Updating `displayOrder` repositions the link in the rendered order.

        > Note: the previous contract used `PUT` (full replace). Changed to `PATCH`
        > (partial update) in v1.9.0 to match the rest of the admin CRUD pattern.
        > The old `PUT /admin/contacts/{id}` is deprecated; backend should accept both
        > for one sprint, then remove PUT.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 3
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
      responses:
        "200":
          description: Updated contact link.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

    delete:
      tags: [Contacts]
      summary: Delete a contact link permanently (owner only)
      operationId: deleteContact
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Permanently removes the contact link record from the database.
        To hide without deleting, use `PATCH /admin/contacts/{id}` with `enabled: false`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 3
      responses:
        "204":
          description: Contact link deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

