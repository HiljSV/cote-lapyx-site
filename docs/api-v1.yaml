      operationId: updateProject
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: Owner can only modify their own projects. Returns 403 if the authenticated owner is not the author.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdateRequest"
      responses:
        "200":
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Owner attempting to modify another owner's resource."
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

    delete:
      tags: [Projects]
      summary: Delete a project (owner only)
      operationId: deleteProject
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: Owner can only modify their own projects. Returns 403 if the authenticated owner is not the author.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      responses:
        "204":
          description: Project deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: "Owner attempting to modify another owner's resource."
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Comments
  # ---------------------------------------------------------------------------

  /posts/{slug}/comments:
    get:
      tags: [Comments]
      summary: List approved comments on a post
      operationId: listComments
      security: []
      x-roles: [public]
      description: |
        Returns approved comments. Owners see all statuses (pending, rejected, deleted) when
        authenticated. Deleted comments are always included in the response regardless of caller
        role. Subscribers see `content: null` with a localized `deletedMessage`; owners see the
        full original content. Both roles receive `deletedAt` and `status: "deleted"` on deleted
        comments.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
      responses:
        "200":
          description: Paginated list of comments.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedCommentResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      tags: [Comments]
      summary: Add a comment to a post (subscriber or owner)
      operationId: createComment
      security:
        - bearerAuth: []
      x-roles: [owner, subscriber]
      description: |
        Submits a comment on the specified post.
        Before saving, the comment is passed through automatic moderation checks
        (profanity filter, hate-speech detection, and, when media support is added,
        image content analysis). If the content is rejected a 422 is returned with
        a machine-readable `reason` field; the comment is NOT persisted.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-z0-9-]+$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "201":
          description: Comment submitted (may be pending human moderation).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          description: Comment rejected by automatic moderation.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/CommentRejectedProblem"
              example:
                type: https://cote-lapyx.com/problems/comment-rejected
                title: Comment Rejected
                status: 422
                detail: The comment was rejected by the automatic moderation filter.
                instance: /api/v1/posts/my-first-post/comments
                reason: profanity

  /comments/{id}:
    delete:
      tags: [Comments]
      summary: Delete a comment (owner deletes any; subscriber deletes own)
      operationId: deleteComment
      security:
        - bearerAuth: []
      x-roles: [owner, subscriber]
      description: |
        Soft delete. Subscriber can delete their own comments regardless of status
        (pending or approved). Owner can delete any comment.
        The comment data is preserved in an audit log inaccessible to the subscriber.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Comment soft-deleted; confirmation payload returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentDeletedResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Subscriber attempting to delete another user's comment.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
              example:
