  /admin/users/{id}:
    get:
      tags: [Admin]
      summary: Get a user by ID with telemetry (owner only)
      operationId: adminGetUser
      security:
        - bearerAuth: []
      x-roles: [owner]
      # F1: returns AdminUserDetailDTO (extends UserDTO with 4 telemetry fields).
      # The admin list endpoint (GET /admin/users) still returns PagedUserResponse
      # (wrapping plain UserDTO) — no telemetry leaks into bulk list responses.
      description: |
        Returns the full user profile for the specified account, including admin-only
        telemetry: `registrationIp`, `lastLoginAt`, `lastLoginIp`, `userAgent`.
        These fields are **never** exposed by `GET /users/me` or any public endpoint.
      parameters:
        - name: id
          in: path
          required: true
