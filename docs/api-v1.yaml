        content:
          type: string
          nullable: true
          maxLength: 2000
          description: |
            Comment body. `null` when `status` is `deleted` and the caller is not an owner.
            Owners always receive the original content even for deleted comments.
        status:
          $ref: "#/components/schemas/CommentStatus"
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of soft-deletion. Present (non-null) only when `status` is `deleted`.
        deletedMessage:
          type: string
          nullable: true
          description: |
            Localized placeholder string shown to subscribers in place of deleted content
            (e.g. "Коментар видалено" / "Comment deleted"). Locale is resolved from the
            `Accept-Language` request header. Null for owner callers.
        createdAt:
          type: string
          format: date-time
        # Sprint 4: like counts, authorship flag, and edit timestamp
        likesCount:
          type: integer
          format: int64
          description: Total number of likes on this comment.
          example: 5
        likedByCurrentUser:
          type: boolean
          description: |
            True when the authenticated requester has liked this comment.
            False for anonymous users and unauthenticated requests.
          example: false
        isMine:
          type: boolean
          description: |
            True when the comment was written by the requesting user.
            False for anonymous requests and for other users' comments.
          example: false
        adminSeen:
          type: boolean
          description: |
            True when an owner has acknowledged this comment in the admin panel
            via `PATCH /admin/comments/{id}/seen`. Always false for non-owner callers
            (the backend omits this flag for subscribers).
          example: false
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: |
            ISO 8601 UTC timestamp of the last author edit.
            Null if the comment has never been edited after initial submission.
          example: "2026-05-10T08:15:00Z"

