            format: int64
      responses:
        "200":
          description: Extended user profile with admin telemetry fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetailDTO"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      tags: [Admin]
      summary: Update user role or name (owner only)
      operationId: adminUpdateUser
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Allows an owner to change another user's `role` or `name`.
        An owner may not change their own role via this endpoint.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAdminUpdateRequest"
      responses:
        "200":
          description: Updated user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDTO"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Attempted to change own role.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"

    delete:
      tags: [Admin]
      summary: Delete a user account (owner only)
      operationId: adminDeleteUser
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Permanently removes the user account and all associated data (comments, subscriptions).
        An owner cannot delete their own account via this endpoint.
        Returns 409 if the target user is an owner with published content.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: User account deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ---------------------------------------------------------------------------
  # Admin — User Activity Log (F1 — telemetry foundation)
  # ---------------------------------------------------------------------------

  /admin/users/{id}/activity:
    get:
      tags: [Admin]
      summary: List activity events for a user (owner only)
      operationId: adminGetUserActivity
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Returns a paginated, reverse-chronological audit log of lifecycle events
        for the specified user account (registrations, logins, profile/email/password
        changes, subscription events, status changes, and account deletion).

        Sourced from the `user_activity` table (Flyway migration added by F1 epic).
        All events are immutable — no write operations exist on this endpoint.

        Returns 404 if the user ID does not exist.
      parameters:
        - name: id
          in: path
          required: true
          description: Numeric ID of the target user account.
          schema:
            type: integer
            format: int64
            example: 42
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        # Default sort is createdAt,desc (newest first) — matches typical admin audit UX.
        - $ref: "#/components/parameters/SortParam"
        # Optional filter to narrow to a specific event category.
        - name: type
          in: query
          required: false
          description: |
            Filter to a specific activity type. Omit to return events of all types.
          schema:
            $ref: "#/components/schemas/UserActivityType"
      responses:
        "200":
          description: Paginated list of user activity events, newest first by default.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedUserActivityResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Admin — Posts (all statuses, all authors)
  # ---------------------------------------------------------------------------

  /admin/posts:
    get:
      tags: [Admin]
      summary: List all posts across all statuses (owner only)
      operationId: adminListPosts
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Returns posts of all statuses (draft, published, archived) from all authors.
        Used by the `/admin/posts` management page. Supports filtering by status, type,
        and author.
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/SizeParam"
        - $ref: "#/components/parameters/SortParam"
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PostStatus"
        - name: type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PostType"
        - name: authorId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: q
          in: query
          description: Full-text search on title or excerpt.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of posts (all statuses).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedBlogPostResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /admin/posts/{id}:
    delete:
      tags: [Admin]
      summary: Force-delete any post by ID (owner only)
      operationId: adminDeletePost
      security:
        - bearerAuth: []
      x-roles: [owner]
      description: |
        Permanently deletes any post regardless of author. Intended for moderation
        (e.g. removing policy-violating content). For normal author-scoped deletion
        use `DELETE /posts/{slug}`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Post permanently deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

