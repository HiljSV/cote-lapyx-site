# Read-only E2E gate (Playwright) — Phase 4 of the AI-workflow audit.
#
# Purpose: a PRE-MERGE pull_request gate that runs the READ-ONLY E2E subset
# (smoke + api + regression) against the live production site. This is distinct
# from the post-deploy `e2e` job in deploy.yml (which runs after a push to main).
#
# Gate policy: NON_BLOCKING. `main` has no required-status-check policy, so this
# workflow is informational and cannot block a merge. It is intentionally NOT
# made blocking (no `continue-on-error` hack); promotion to a required check is a
# separate, deliberate repository-settings change (see audit Phase 4C criteria).
#
# Safety: read-only only — no form submits, comment posting, account changes, or
# deletes. The auth suite is NOT run here (no credentials passed) so it skips,
# guaranteeing no authenticated/owner-account interaction from CI.
name: E2E read-only gate

# Trigger on PRs to the default branch, plus manual dispatch for ad-hoc runs.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e-readonly:
    runs-on: ubuntu-latest
    # Hard ceiling so a hung page/network never burns CI minutes indefinitely.
    timeout-minutes: 15
    steps:
      # Check out the PR head so the spec files under test match the PR.
      - uses: actions/checkout@v4

      # Pinned Node version (matches deploy.yml) with npm cache for fast installs.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Reproducible install from the lockfile.
      - name: Install dependencies
        run: npm ci

      # Only Chromium is needed (single project in playwright.config.ts).
      - name: Install Playwright browser (chromium)
        run: npx playwright install chromium --with-deps

      # Read-only subset only: smoke + api + regression. The auth suite is
      # deliberately excluded (no E2E_EMAIL/E2E_PASSWORD secrets are provided),
      # so no authenticated/mutating path is ever exercised from CI.
      - name: Run read-only E2E subset
        run: >-
          npx playwright test
          tests/e2e/smoke.spec.ts
          tests/e2e/api.spec.ts
          tests/e2e/regression.spec.ts
          --reporter=list,html
        env:
          CI: true

      # On failure, keep the HTML report + traces/screenshots for diagnosis.
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
