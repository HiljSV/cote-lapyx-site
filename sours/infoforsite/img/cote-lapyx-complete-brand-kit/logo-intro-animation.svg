
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="180" viewBox="0 0 600 180">
  <image href="cote-lapyx-logo-clean.png" x="50" y="20" width="500" height="140" opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="1.2s" fill="freeze"/>
    <animateTransform attributeName="transform"
      type="translate"
      from="-40 0"
      to="0 0"
      dur="1.2s"
      fill="freeze"/>
  </image>
</svg>
