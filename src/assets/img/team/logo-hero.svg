  <polygon points="305,348 380,312 418,382 390,462 330,472 302,422"
    fill="#181e32" opacity="0.9"/>
  <polygon points="720,358 645,312 612,382 640,462 700,472 724,422"
    fill="#161b2f" opacity="0.9"/>
  <polygon points="458,308 512,292 568,308 548,382 512,398 478,382"
    fill="#232840" opacity="0.9"/>
  <polygon points="380,312 438,298 464,332 445,392 402,402 364,372 355,332"
