  <ellipse cx="415" cy="358" rx="32" ry="23" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.5" filter="url(#glow-cyan)"/>
  <ellipse cx="415" cy="358" rx="10" ry="7" fill="#00e5ff" opacity="0.6" filter="url(#glow-strong)"/>

  <!-- RIGHT EYE -->
  <ellipse cx="612" cy="358" rx="44" ry="30" fill="#080c18" opacity="0.95"/>
  <ellipse cx="612" cy="358" rx="30" ry="21" fill="#004050" opacity="0.9"/>
  <ellipse cx="612" cy="358" rx="20" ry="14" fill="#00b8d4" opacity="0.95"/>
  <ellipse cx="612" cy="358" rx="10" ry="7" fill="#00e5ff" opacity="1"/>
  <ellipse cx="612" cy="358" rx="3.5" ry="13" fill="#06080f" opacity="0.95"/>
  <ellipse cx="612" cy="358" rx="32" ry="23" fill="none" stroke="#00e5ff" stroke-width="1" opacity="0.5" filter="url(#glow-cyan)"/>
