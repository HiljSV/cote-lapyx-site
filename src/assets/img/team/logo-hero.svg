  <rect x="261" y="215" width="11" height="11" fill="#00e5ff" opacity="0.8"/>
  <rect x="274" y="215" width="11" height="11" fill="#00e5ff" opacity="0.55"/>
  <rect x="248" y="228" width="11" height="11" fill="#00e5ff" opacity="0.7"/>
  <rect x="261" y="228" width="11" height="11" fill="#00e5ff" opacity="0.85"/>
  <rect x="274" y="228" width="11" height="11" fill="#00e5ff" opacity="0.4"/>
  <rect x="248" y="241" width="11" height="11" fill="#00e5ff" opacity="0.45"/>
