  <!-- Mouth lines -->
  <line x1="512" y1="480" x2="498" y2="500" stroke="#00e5ff" stroke-width="1.2" opacity="0.45"/>
  <line x1="512" y1="480" x2="526" y2="500" stroke="#00e5ff" stroke-width="1.2" opacity="0.45"/>

  <!-- Whisker marks -->
  <line x1="312" y1="432" x2="358" y2="418" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <line x1="315" y1="450" x2="358" y2="440" stroke="#00e5ff" stroke-width="1" opacity="0.25"/>
  <line x1="712" y1="432" x2="666" y2="418" stroke="#00e5ff" stroke-width="1" opacity="0.35"/>
  <line x1="710" y1="450" x2="666" y2="440" stroke="#00e5ff" stroke-width="1" opacity="0.25"/>

  <!-- Ear base accent lines -->
  <line x1="348" y1="300" x2="390" y2="300" stroke="#00e5ff" stroke-width="1.5" opacity="0.65" filter="url(#glow-cyan)"/>
  <line x1="640" y1="300" x2="680" y2="300" stroke="#e040fb" stroke-width="1.5" opacity="0.55" filter="url(#glow-magenta)"/>

  <!-- Small dot accents -->
  <circle cx="355" cy="492" r="3" fill="#00e5ff" opacity="0.55"/>
  <circle cx="670" cy="492" r="3" fill="#00e5ff" opacity="0.55"/>

  <!-- TEXT underline (magenta) -->
  <rect x="272" y="760" width="480" height="4" fill="#e040fb" opacity="0.92" rx="2" filter="url(#glow-magenta)"/>

  <!-- TEXT glow -->
  <text x="512" y="752"
    font-family="'Orbitron', 'Share Tech Mono', 'Courier New', monospace"
    font-size="90" font-weight="700"
    text-anchor="middle"
    fill="#00e5ff"
    opacity="0.35"
    filter="url(#glow-strong)"
    letter-spacing="5">cote-lapyx</text>

  <!-- TEXT main -->
  <text x="512" y="752"
    font-family="'Orbitron', 'Share Tech Mono', 'Courier New', monospace"
    font-size="90" font-weight="700"
    text-anchor="middle"
    fill="#00e5ff"
    opacity="1"
    filter="url(#text-glow)"
    letter-spacing="5">cote-lapyx</text>
