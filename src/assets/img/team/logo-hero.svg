  <polygon points="645,312 588,298 562,332 582,392 625,402 663,372 672,332"
    fill="#1c2235" opacity="0.9"/>
  <polygon points="428,442 512,428 598,442 612,502 562,548 512,562 464,548 415,502"
    fill="#1c2340" opacity="0.9"/>
  <polygon points="464,548 512,562 562,548 578,592 512,616 448,592"
    fill="#14192c" opacity="0.95"/>
  <polygon points="340,548 415,502 428,542 400,595 340,562"
