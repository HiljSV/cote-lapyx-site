<head>
  <!-- Analytics: Umami only (self-hosted, privacy-first). Google Analytics removed (P2-2). -->
  <!-- Umami Analytics (self-hosted, privacy-first) -->
  <script
    async
    defer
    src="https://analytics.cote-lapyx.com/script.js"
    data-website-id="1fd4bed6-4a0a-4830-81a1-8738503839aa"
  ></script>

  <if condition="'[[preloader.enable]]' === 'true'">
    <include
      src="@components/effects/preloader/preloader.html"
      locals='{"once":"[[preloader.once]]"}'
    ></include>
  </if>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <include src="@components/layout/head/fonts-preload.html"></include>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Geologica:wght@400;600;700&family=Nunito:wght@400;500;600&display=swap"
  />
  <link rel="stylesheet" href="@styles/fonts/fonts.css" />
  <link rel="stylesheet" href="@styles/fonts/iconfont.css" />
  <link rel="stylesheet" href="@styles/style.scss" />
  <link rel="icon" type="image/x-icon" href="@img/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="@img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="@img/favicon-16.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="@img/favicon-192.png" />
  <if condition="'[[keywords]]' !== ''">
    <meta name="keywords" content="[[keywords]]" />
  </if>
  <if condition="'[[description]]' !== ''">
    <meta name="description" content="[[description]]" />
  </if>

  <!-- Open Graph / Social sharing -->
  <meta property="og:type" content="[[og_type]]" />
  <meta property="og:url" content="[[canonical]]" />
  <meta property="og:title" content="[[title]]" />
  <meta property="og:description" content="[[description]]" />
  <meta
    property="og:image"
    content="https://cote-lapyx.com/assets/img/og-image.png"
  />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="[[og_locale]]" />
  <meta property="og:site_name" content="COTE-LAPYX" />
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="[[title]]" />
  <meta name="twitter:description" content="[[description]]" />
  <meta
    name="twitter:image"
    content="https://cote-lapyx.com/assets/img/og-image.png"
  />
  <!-- Canonical URL -->
  <link rel="canonical" href="[[canonical]]" />

  <!-- Structured data: Organization + WebSite (P2-1) — helps search engines understand the brand -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://cote-lapyx.com/#organization",
          "name": "cote-lapyx",
          "url": "https://cote-lapyx.com",
          "logo": "https://cote-lapyx.com/assets/img/og-image.png",
          "email": "info@cote-lapyx.com",
          "sameAs": [
            "https://github.com/cote-lapyx-com",
            "https://t.me/cotelapyx"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://cote-lapyx.com/#website",
          "url": "https://cote-lapyx.com",
          "name": "cote-lapyx",
          "publisher": { "@id": "https://cote-lapyx.com/#organization" }
        }
      ]
    }
  </script>

  <title>[[title]]</title>
</head>
