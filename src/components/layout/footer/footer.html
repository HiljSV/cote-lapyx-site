<footer data-fls-footer class="footer">
  <div class="footer__container">
    <!-- Top: 3 columns -->
    <div class="footer__top">
      <!-- Logo + tagline + socials -->
      <div class="footer__col">
        <a href="/" class="footer__logo" aria-label="cote-lapyx — на головну">
          <p class="footer__nav-title">COTE-LAPYX</p>
        </a>
        <!-- Footer: tagline — translatable -->
        <p class="footer__tagline" data-i18n="footer.tagline">
          IT-студія повного циклу — frontend, backend, дизайн. Перетворюємо ідеї
          на продукти.
        </p>
        <!-- Footer: socials slot — populated dynamically by socialLinks.js -->
        <!-- JS injects <a class="footer__social-link"> anchors at runtime -->
        <!-- Empty until API responds; no hardcoded # placeholders -->
        <div
          class="footer__socials"
          data-social-slot="footer"
          aria-label="Соціальні мережі"
        ></div>
      </div>

      <!-- Footer: navigation column — data-i18n on title and each link -->
      <div class="footer__col">
        <!-- Navigation column title -->
        <p class="footer__nav-title" data-i18n="footer.nav_title">Навігація</p>
        <ul class="footer__nav-list" role="list">
          <!-- Footer nav: Home -->
          <li>
            <a href="/" class="footer__nav-link"
              ><span data-i18n="nav.home">Головна</span></a
            >
          </li>
          <!-- Footer nav: About -->
          <li>
            <a href="/#about" class="footer__nav-link"
              ><span data-i18n="nav.about">Про нас</span></a
            >
          </li>
          <!-- Footer nav: Team -->
          <li>
            <a href="team.html" class="footer__nav-link"
              ><span data-i18n="nav.team">Команда</span></a
            >
          </li>
          <!-- Footer nav: Services -->
          <li>
            <a href="/#services" class="footer__nav-link"
              ><span data-i18n="nav.services">Послуги</span></a
            >
          </li>
          <!-- Footer nav: Projects -->
          <li>
            <a href="projects.html" class="footer__nav-link"
              ><span data-i18n="nav.projects">Проекти</span></a
            >
          </li>
          <!-- Footer nav: Blog -->
          <li>
            <a href="blog.html" class="footer__nav-link"
              ><span data-i18n="nav.blog">Блог</span></a
            >
          </li>
          <!-- Footer nav: Contact -->
          <li>
            <a href="/#contact" class="footer__nav-link"
              ><span data-i18n="nav.contact">Контакт</span></a
            >
          </li>
        </ul>
      </div>

      <!-- Footer: contacts column — title stays; links populated by socialLinks.js -->
      <div class="footer__col footer__col--contacts">
        <!-- Contacts column title -->
        <p class="footer__nav-title" data-i18n="footer.contacts_title">
          Контакти
        </p>
        <!-- Contact links slot — JS renders footer__contact-item anchors here -->
        <!-- socialLinks.js injects company links from GET /api/v1/contacts -->
        <div
          data-social-slot="footer-contacts"
          class="footer__contacts-slot"
        ></div>
      </div>
    </div>

    <!-- Footer: bottom bar — copyright and powered-by -->
    <div class="footer__bottom">
      <!-- Copyright — full text including © symbol is in JSON value -->
      <p class="footer__copyright" data-i18n="footer.copyright">
        © 2019–2026 cote-lapyx. Всі права захищені.
      </p>
      <!-- Powered by — static text, not translated -->
      <p class="footer__powered">Powered by <span>cote-lapyx team</span></p>
    </div>
  </div>
</footer>
