<header data-fls-header class="header">
	<div class="header__container">

		<!-- Логотип -->
		<a href="/" class="header__logo" aria-label="Cote Lapyx — на головну">
			<img src="@img/logo.svg" alt="Cote Lapyx" class="header__logo-img" width="140" height="40">
		</a>

		<!-- Навігація -->
		<nav class="header__nav" id="header-nav" aria-label="Головна навігація">
			<ul class="header__nav-list">
				<li class="header__nav-item">
					<if condition="'[[active]]' === 'Головна'">
						<a href="/" class="header__nav-link header__nav-link--active" aria-current="page">Головна</a>
					</if>
					<else>
						<a href="/" class="header__nav-link">Головна</a>
					</else>
				</li>
				<li class="header__nav-item">
					<if condition="'[[active]]' === 'Про нас'">
						<a href="/about" class="header__nav-link header__nav-link--active" aria-current="page">Про нас</a>
					</if>
					<else>
						<a href="/about" class="header__nav-link">Про нас</a>
					</else>
				</li>
				<li class="header__nav-item">
					<if condition="'[[active]]' === 'Команда'">
						<a href="/team" class="header__nav-link header__nav-link--active" aria-current="page">Команда</a>
					</if>
					<else>
						<a href="/team" class="header__nav-link">Команда</a>
					</else>
				</li>
				<li class="header__nav-item">
					<if condition="'[[active]]' === 'Послуги'">
						<a href="/services" class="header__nav-link header__nav-link--active" aria-current="page">Послуги</a>
					</if>
					<else>
						<a href="/services" class="header__nav-link">Послуги</a>
					</else>
				</li>
				<li class="header__nav-item">
					<if condition="'[[active]]' === 'Проекти'">
						<a href="/projects" class="header__nav-link header__nav-link--active" aria-current="page">Проекти</a>
					</if>
					<else>
						<a href="/projects" class="header__nav-link">Проекти</a>
					</else>
				</li>
				<li class="header__nav-item">
					<if condition="'[[active]]' === 'Блог'">
						<a href="/blog" class="header__nav-link header__nav-link--active" aria-current="page">Блог</a>
					</if>
					<else>
						<a href="/blog" class="header__nav-link">Блог</a>
					</else>
				</li>
				<li class="header__nav-item">
					<if condition="'[[active]]' === 'Контакти'">
						<a href="/contacts" class="header__nav-link header__nav-link--active" aria-current="page">Контакти</a>
					</if>
					<else>
						<a href="/contacts" class="header__nav-link">Контакти</a>
					</else>
				</li>
			</ul>
		</nav>

		<!-- Праві елементи -->
		<div class="header__actions">

			<!-- Перемикач мови -->
			<div class="header__lang" role="group" aria-label="Вибір мови">
				<button type="button" class="header__lang-btn header__lang-btn--active" data-lang="ua" aria-pressed="true">UA</button>
				<span class="header__lang-sep" aria-hidden="true">/</span>
				<button type="button" class="header__lang-btn" data-lang="en" aria-pressed="false">EN</button>
			</div>

			<!-- Перемикач теми -->
			<button
				type="button"
				class="header__theme-toggle"
				id="theme-toggle"
				aria-label="Переключити тему"
				data-theme-toggle
			>
				<svg class="header__theme-icon header__theme-icon--sun" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
					<circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
					<line x1="12" y1="2" x2="12" y2="4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
					<line x1="12" y1="20" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
					<line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
					<line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
					<line x1="2" y1="12" x2="4" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
					<line x1="20" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
					<line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
					<line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
				</svg>
				<svg class="header__theme-icon header__theme-icon--moon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
					<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
				</svg>
			</button>

			<!-- Кнопка Login -->
			<a href="/login" class="btn-primary header__login-btn">Увійти</a>

		</div>

		<!-- Overlay (мобайл) -->
		<div class="header__overlay" aria-hidden="true"></div>

		<!-- Бургер (мобайл) -->
		<button
			type="button"
			class="header__burger"
			id="header-burger"
			aria-label="Відкрити меню"
			aria-expanded="false"
			aria-controls="header-nav"
			data-fls-burger
		>
			<span class="header__burger-line" aria-hidden="true"></span>
			<span class="header__burger-line" aria-hidden="true"></span>
			<span class="header__burger-line" aria-hidden="true"></span>
		</button>

	</div>
</header>
