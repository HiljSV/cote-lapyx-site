<!-- PROJECT DETAIL HERO -->
<div class="page-hero project-detail-hero">
  <div class="page-hero__container project-detail-hero__container">
    <!-- Breadcrumb -->
    <nav class="post-breadcrumb" aria-label="Навігація по сторінках">
      <a href="projects.html" class="post-breadcrumb__link"
        ><span data-i18n="project.breadcrumb.back">← Проекти</span></a
      >
    </nav>

    <!-- Meta: status badge + date -->
    <div class="project-detail-hero__meta">
      <span
        class="project-detail-hero__status"
        id="project-status-badge"
      ></span>
      <time class="project-detail-hero__date" id="project-date"></time>
    </div>

    <!-- Title — JS overwrites textContent with real title; no data-i18n to avoid collision on lang switch -->
    <h1 class="page-hero__heading" id="project-title">Завантаження...</h1>

    <!-- Short description -->
    <p
      class="page-hero__subheading project-detail-hero__desc"
      id="project-short-desc"
    ></p>

    <!-- Author block — rendered by JS (avatar + name) -->
    <div
      class="post-hero__author"
      id="project-author-block"
      aria-label="Автор проекту"
    ></div>

    <!-- Links block — JS injects GitHub/Demo buttons -->
    <div
      class="project-detail-hero__links"
      id="project-links"
      aria-label="Посилання на проект"
    ></div>
  </div>
</div>

<main class="page" id="project-main">
  <!-- ===== Fix B: cover image container =====
       Wrapping in .page__container mirrors the post page structure exactly:
       .page__container > .post-cover > .post-cover__inner > img
       This gives the 15px side gutters and an 800px max-width inner cap,
       matching the post-article body column so cover and text align perfectly. -->
  <div class="page__container">
    <div class="post-cover" id="project-cover-wrap" hidden>
      <!-- JS injects: <div class="post-cover__inner"><img class="post-cover__img" src="..." alt="..."></div> -->
    </div>
  </div>
  <!-- ===== /Fix B ===== -->

  <!-- Main content + sidebar -->
  <section
    class="section section--dark project-detail-section"
    aria-label="Про проект"
  >
    <div class="page__container project-detail-section__grid">
      <!-- Left: article content -->
      <div class="project-detail__content" id="project-content">
        <p class="post-article__loading" data-i18n="ui.loading">
          Завантаження...
        </p>
      </div>

      <!-- Right: sidebar -->
      <aside class="project-detail__sidebar" aria-label="Деталі проекту">
        <!-- ===== Fix A.4: tech tags container =====
             h2 title is static HTML (translated via data-i18n — no JS reconstruction needed).
             JS now targets #project-tech-tags (.project-detail__tech-tags = flex-wrap:wrap, gap:8px)
             instead of #project-tech (.project-detail__tech = flex-direction:column → full-width stretch).
             Result: neon-badge chips render compact and wrap naturally. -->
        <div class="project-detail__tech" id="project-tech">
          <h2
            class="project-detail__tech-title"
            data-i18n="project.sidebar.tech_title"
          >
            Технології
          </h2>
          <!-- JS injects neon-badge spans here (flex-wrap row) -->
          <div class="project-detail__tech-tags" id="project-tech-tags"></div>
        </div>
        <!-- ===== /Fix A.4 ===== -->

        <!-- Additional meta (date, status, links, etc.) — JS injects key-value rows -->
        <div class="project-detail__meta-block" id="project-meta-block">
          <!-- JS injects <dl> key-value pairs -->
        </div>
      </aside>
    </div>
  </section>

  <!-- Not-found state — shown by JS when project is missing -->
  <section
    class="section section--dark post-not-found"
    id="project-not-found"
    hidden
    aria-label="Не знайдено"
  >
    <div class="page__container">
      <p class="post-not-found__msg" data-i18n="project.not_found">
        Проект не знайдено.
      </p>
      <a href="projects.html" class="btn btn--cyan"
        ><span data-i18n="project.not_found.back"
          >← Повернутись до проектів</span
        ></a
      >
    </div>
  </section>
</main>
