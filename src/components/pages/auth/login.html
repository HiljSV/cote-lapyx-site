<section class="auth-section">
  <div class="auth-card" style="width: 100%; max-width: 440px">
    <!-- Header -->
    <div class="auth-card__header">
      <!-- Login title — translated via data-i18n -->
      <h1 class="auth-card__title" data-i18n="auth.login_title">Вхід</h1>
      <!-- Welcome subtitle — translated via data-i18n -->
      <p class="auth-card__subtitle" data-i18n="auth.welcome_back">
        З поверненням до cote-lapyx
      </p>
    </div>

    <!-- Registration success banner (shown via JS when ?registered=1) — translated -->
    <div
      class="auth-form__success"
      id="login-reg-success"
      data-i18n="auth.reg_success"
      hidden
    >
      Реєстрація успішна! Тепер увійдіть до свого акаунту.
    </div>

    <!-- Login form -->
    <form class="auth-form" id="login-form" novalidate>
      <!-- Email field -->
      <div class="auth-form__group">
        <label class="auth-form__label" for="login-email">Email</label>
        <div class="auth-form__input-wrap">
          <svg
            class="auth-form__icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
            />
          </svg>
          <input
            class="auth-form__input"
            type="email"
            id="login-email"
            name="email"
            placeholder="your@email.com"
            autocomplete="email"
            required
          />
        </div>
        <span
          class="auth-form__error"
          id="login-email-error"
          role="alert"
        ></span>
      </div>

      <!-- Password field -->
      <div class="auth-form__group">
        <!-- Password label — translated via data-i18n -->
        <label
          class="auth-form__label"
          for="login-password"
          data-i18n="auth.password"
          >Пароль</label
        >
        <div class="auth-form__input-wrap">
          <svg
            class="auth-form__icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"
            />
          </svg>
          <input
            class="auth-form__input"
            type="password"
            id="login-password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button
            type="button"
            class="auth-form__toggle-password"
            aria-label="Показати пароль"
            data-i18n-aria="auth.show_password_aria"
            data-toggle-password="login-password"
          >
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"
              />
            </svg>
          </button>
        </div>
        <span
          class="auth-form__error"
          id="login-password-error"
          role="alert"
        ></span>
      </div>

      <!-- Server error -->
      <div
        class="auth-form__server-error"
        id="login-server-error"
        role="alert"
        hidden
      ></div>

      <!-- Submit — translated via data-i18n -->
      <button
        type="submit"
        class="btn btn--cyan btn--lg auth-form__submit"
        id="login-submit"
        data-i18n="auth.login_btn"
      >
        Увійти
      </button>
    </form>

    <!-- Footer link -->
    <div class="auth-card__footer">
      <!-- "No account?" prompt + register link — each part translated separately -->
      <p class="auth-card__footer-text">
        <!-- Prompt text only — does not contain the link so textContent is safe -->
        <span data-i18n="auth.no_account">Немає акаунту?</span>
        <!-- Register link text — translated separately -->
        <a
          href="register.html"
          class="auth-card__link"
          data-i18n="auth.register_link"
          >Зареєструватись</a
        >
      </p>
    </div>
  </div>
</section>
