<!-- PAGE HERO -->
<div class="page-hero">
  <div class="page-hero__container">
    <h1 class="page-hero__heading">
      <span data-i18n="blog.hero.title">Блог</span>
    </h1>
    <p class="page-hero__subheading" data-i18n="blog.hero.subtitle">
      Думки, досвід і технічні нотатки команди cote-lapyx
    </p>
  </div>
</div>

<main class="page">
  <section class="section section--dark" aria-label="Статті блогу">
    <div class="page__container">
      <!-- Filter bar -->
      <div class="blog-page__filter">
        <div class="filter-bar" role="search" aria-label="Фільтр статей">
          <div class="filter-bar__group">
            <span class="filter-bar__label" data-i18n="blog.filter.category_label">Категорія:</span>
            <button class="filter-bar__btn is-active" data-filter-cat="all">
              <span data-i18n="filter.all">Всі</span>
            </button>
            <button class="filter-bar__btn" data-filter-cat="frontend">
              Frontend
            </button>
            <button class="filter-bar__btn" data-filter-cat="backend">
              Backend
            </button>
            <button class="filter-bar__btn" data-filter-cat="design">
              Design
            </button>
            <button class="filter-bar__btn" data-filter-cat="devops">
              DevOps
            </button>
          </div>
          <div class="filter-bar__search">
            <span class="filter-bar__search-icon" aria-hidden="true"
              >&#128269;</span
            >
            <input
              class="filter-bar__search-input"
              type="search"
              placeholder="Пошук статей..."
              aria-label="Пошук статей"
              data-i18n-placeholder="blog.filter.search_placeholder"
              data-i18n-aria="blog.filter.search_aria"
              id="blog-search"
            />
          </div>
        </div>
      </div>

      <!-- Grid -->
      <ul class="blog-page__grid" id="blog-list" role="list">
        <li class="blog-page__loading" id="blog-loading" aria-live="polite" data-i18n="ui.loading">
          Завантаження...
        </li>
      </ul>

      <!-- Load more -->
      <div class="blog-page__more" id="blog-more-wrap" hidden>
        <button type="button" class="btn btn--ghost" id="blog-load-more">
          <span data-i18n="ui.load_more">Завантажити ще</span>
        </button>
      </div>
    </div>
  </section>
</main>
