<!-- PAGE HERO -->
<div class="page-hero">
  <div class="page-hero__container">
    <h1 class="page-hero__heading">Проекти</h1>
    <p class="page-hero__subheading">
      Що ми побудували — від ідеї до продакшену
    </p>
  </div>
</div>

<main class="page">
  <section class="section section--dark" aria-label="Список проектів">
    <div class="page__container">
      <!-- Filter bar -->
      <div class="projects-page__filter">
        <div class="filter-bar" role="search" aria-label="Фільтр проектів">
          <div class="filter-bar__group">
            <span class="filter-bar__label">Стек:</span>
            <button class="filter-bar__btn is-active" data-filter-tech="">
              Всі
            </button>
            <button class="filter-bar__btn" data-filter-tech="HTML">
              HTML/CSS
            </button>
            <button class="filter-bar__btn" data-filter-tech="JavaScript">
              JavaScript
            </button>
            <button class="filter-bar__btn" data-filter-tech="Python">
              Python
            </button>
            <button class="filter-bar__btn" data-filter-tech="Java">
              Java
            </button>
          </div>
          <div class="filter-bar__search">
            <span class="filter-bar__search-icon" aria-hidden="true"
              >&#128269;</span
            >
            <input
              class="filter-bar__search-input"
              type="search"
              placeholder="Пошук проектів..."
              aria-label="Пошук проектів"
              id="projects-search"
            />
          </div>
        </div>
      </div>

      <!-- Grid -->
      <ul class="projects-page__grid" role="list" id="projects-grid">
        <li
          class="projects-page__loading"
          id="projects-loading"
          aria-live="polite"
        >
          Завантаження...
        </li>
      </ul>

      <!-- Load more -->
      <div class="blog-page__more" id="projects-more-wrap" hidden>
        <button type="button" class="btn btn--ghost" id="projects-load-more">
          Завантажити ще
        </button>
      </div>
    </div>
  </section>
</main>
