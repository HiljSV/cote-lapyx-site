<!-- PAGE HERO -->
<div class="page-hero">
  <div class="page-hero__container">
    <h1 class="page-hero__heading">
      <span data-i18n="projects.hero.title">Проекти</span>
    </h1>
    <p class="page-hero__subheading" data-i18n="projects.hero.subtitle">
      Що ми побудували — від ідеї до продакшену
    </p>
  </div>
</div>

<main class="page">
  <section class="section section--dark" aria-label="Список проектів">
    <div class="page__container">
      <!-- Filter bar -->
      <div class="projects-page__filter">
        <div class="filter-bar" role="search" aria-label="Фільтр проектів">
          <!-- Tech filter: "All" is static; stack buttons are injected by
               projects.js (loadTechFilters) from technologies actually used by
               projects → no dead buttons. Filter param: ?technology=<name>. -->
          <div class="filter-bar__group" id="projects-filter-group">
            <span
              class="filter-bar__label"
              data-i18n="projects.filter.stack_label"
              >Стек:</span
            >
            <button class="filter-bar__btn is-active" data-filter-tech="">
              <span data-i18n="filter.all">Всі</span>
            </button>
          </div>
          <div class="filter-bar__search">
            <span class="filter-bar__search-icon" aria-hidden="true"
              >&#128269;</span
            >
            <input
              class="filter-bar__search-input"
              type="search"
              placeholder="Пошук проектів..."
              aria-label="Пошук проектів"
              data-i18n-placeholder="projects.filter.search_placeholder"
              data-i18n-aria="projects.filter.search_aria"
              id="projects-search"
            />
          </div>
        </div>
      </div>

      <!-- Grid -->
      <ul class="projects-page__grid" role="list" id="projects-grid">
        <li
          class="projects-page__loading"
          id="projects-loading"
          aria-live="polite"
          data-i18n="ui.loading"
        >
          Завантаження...
        </li>
      </ul>

      <!-- Load more -->
      <div class="blog-page__more" id="projects-more-wrap" hidden>
        <button type="button" class="btn btn--ghost" id="projects-load-more">
          <span data-i18n="ui.load_more">Завантажити ще</span>
        </button>
      </div>
    </div>
  </section>
</main>
