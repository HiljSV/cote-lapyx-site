<main class="page">
  <!-- PROFILE HERO — Валерія (default) -->
  <section class="member-hero" aria-label="Профіль учасника">
    <div class="member-hero__container">
      <div class="member-hero__photo-wrap">
        <div id="member-photo-wrap"></div>
      </div>
      <div class="member-hero__info">
        <h1 class="member-hero__name" id="member-name"></h1>
        <p class="member-hero__role" id="member-role"></p>
        <p class="member-hero__bio" id="member-bio"></p>
        <ul
          class="member-hero__badges"
          id="member-badges"
          aria-label="Навички"
          role="list"
        ></ul>
        <div class="member-hero__actions" id="member-socials"></div>
      </div>
    </div>
  </section>

  <div class="section-divider" aria-hidden="true"></div>

  <!-- SKILLS -->
  <section class="section section--surface" aria-labelledby="skills-heading">
    <div class="page__container">
      <div class="section__header">
        <h2 class="section-title" id="skills-heading" data-i18n="member.skills.title">Технічні навички</h2>
      </div>
      <div class="member-skills__grid" id="member-skills"></div>
    </div>
  </section>

  <div class="section-divider" aria-hidden="true"></div>

  <!-- PORTFOLIO -->
  <section class="section section--dark" aria-labelledby="portfolio-heading">
    <div class="page__container">
      <div class="section__header">
        <h2 class="section-title" id="portfolio-heading" data-i18n="member.projects.title">Особисті проекти</h2>
      </div>
      <ul class="member-portfolio__grid" id="member-projects" role="list"></ul>
    </div>
  </section>

  <div class="section-divider" aria-hidden="true"></div>

  <!-- BLOG POSTS -->
  <section class="section section--surface" aria-labelledby="posts-heading">
    <div class="page__container">
      <div class="section__header">
        <h2 class="section-title" id="posts-heading" data-i18n="member.posts.title">Статті</h2>
      </div>
      <nav
        class="member-posts__list"
        id="member-posts"
        aria-label="Статті учасника"
      ></nav>
    </div>
  </section>

  <div class="section-divider" aria-hidden="true"></div>

  <!-- CONTACT -->
  <section class="cta" aria-labelledby="member-contact-heading">
    <div class="cta__container">
      <h2 class="cta__heading" id="member-contact-heading" data-i18n="member.cta.heading">
        Хочете співпрацювати?
      </h2>
      <p class="cta__subheading" data-i18n="member.cta.subheading">
        Відкрита до нових проектів та фрілансу. Пишіть — обговоримо!
      </p>
      <a
        href="mailto:hello@cote-lapyx.com"
        class="btn btn--cyan btn--lg btn--pulse-cyan"
        ><span data-i18n="member.cta.btn">Написати</span></a
      >
    </div>
  </section>
</main>
