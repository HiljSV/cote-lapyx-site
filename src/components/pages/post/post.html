<!-- POST HERO -->
<div class="page-hero post-hero">
  <div class="page-hero__container post-hero__container">
    <!-- Breadcrumb -->
    <nav class="post-breadcrumb" aria-label="Навігація по сторінках">
      <a href="blog.html" class="post-breadcrumb__link"
        ><span data-i18n="post.breadcrumb.back">← Блог</span></a
      >
    </nav>

    <!-- Meta: category + date -->
    <div class="post-hero__meta">
      <span class="post-hero__category" id="post-category"></span>
      <time class="post-hero__date" id="post-date"></time>
    </div>

    <!-- Title — JS overwrites textContent with real title; no data-i18n to avoid collision on lang switch -->
    <h1 class="page-hero__heading post-hero__title" id="post-title">
      Завантаження...
    </h1>

    <!-- Author block — rendered by JS (avatar + name) -->
    <div
      class="post-hero__author"
      id="post-author-block"
      aria-label="Автор статті"
    ></div>
  </div>
</div>

<main class="page" id="post-main">
  <!-- Cover image — injected by JS, hidden until available -->
  <!-- Cover mirrors .post-article__body box model EXACTLY:
       .page__container supplies the 15px side gutters (same container as the article body),
       .post-cover__inner is max-width:800px with NO own padding — identical to .post-article__body.
       Result: cover content box == text content box at every viewport width. -->
  <div class="page__container">
    <div class="post-cover" id="post-cover-wrap" hidden>
      <!-- JS injects: <div class="post-cover__inner"><img class="post-cover__img" .../></div> -->
    </div>
  </div>

  <!-- Article body -->
  <article
    class="section section--dark post-article"
    aria-labelledby="post-title"
  >
    <div class="page__container">
      <div class="post-article__body" id="post-content">
        <p class="post-article__loading" data-i18n="ui.loading">
          Завантаження...
        </p>
      </div>
    </div>
  </article>

  <!-- Post actions: like, favorite, subscribe -->
  <section
    class="section section--surface post-actions"
    id="post-actions-section"
  >
    <div class="page__container">
      <div class="post-actions__bar">
        <button
          type="button"
          class="post-actions__btn post-actions__btn--like"
          id="post-like-btn"
          aria-label="Подобається"
          data-i18n-aria="post.action.like_aria"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"
            />
          </svg>
          <span id="post-like-count">0</span>
        </button>

        <button
          type="button"
          class="post-actions__btn post-actions__btn--fav"
          id="post-fav-btn"
          aria-label="Додати в обране"
          data-i18n-aria="post.action.fav_aria"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z"
            />
          </svg>
          <span data-i18n="post.action.fav">Обране</span>
        </button>

        <button
          type="button"
          class="post-actions__btn post-actions__btn--sub"
          id="post-sub-btn"
          aria-label="Підписатися"
          data-i18n-aria="post.action.sub_aria"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="currentColor"
            aria-hidden="true"
          >
            <path
              d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"
            />
          </svg>
          <span data-i18n="post.action.sub">Підписатися</span>
        </button>
      </div>
    </div>
  </section>

  <!-- Subscribe form — toggled by JS -->
  <div class="post-subscribe-form" id="post-subscribe-form" hidden>
    <div class="page__container">
      <form class="post-subscribe-form__inner" id="post-sub-form" novalidate>
        <input
          class="post-subscribe-form__input"
          type="email"
          id="post-sub-email"
          placeholder="your@email.com"
          required
        />
        <button
          type="submit"
          class="btn btn--cyan btn--sm"
          id="post-sub-submit"
        >
          <span data-i18n="post.subscribe.btn">Підписатися</span>
        </button>
      </form>
      <p class="post-subscribe-form__msg" id="post-sub-msg" hidden></p>
    </div>
  </div>

  <!-- Comments section -->
  <section
    class="section section--dark post-comments"
    id="post-comments-section"
  >
    <div class="page__container">
      <h2 class="post-comments__title" data-i18n="post.comments.title">
        Коментарі
      </h2>

      <form class="post-comments__form" id="post-comment-form" novalidate>
        <textarea
          class="post-comments__textarea"
          id="post-comment-text"
          placeholder="Напишіть коментар..."
          data-i18n-placeholder="post.comments.placeholder"
          rows="3"
          maxlength="2000"
        ></textarea>
        <div class="post-comments__form-footer">
          <span class="post-comments__char-count"
            ><span id="post-comment-chars">0</span>/2000</span
          >
          <button
            type="submit"
            class="btn btn--cyan btn--sm"
            id="post-comment-submit"
          >
            <span data-i18n="post.comments.submit">Надіслати</span>
          </button>
        </div>
        <p class="post-comments__form-msg" id="post-comment-msg" hidden></p>
      </form>

      <div class="post-comments__list" id="post-comments-list">
        <p
          class="post-comments__empty"
          id="post-comments-empty"
          hidden
          data-i18n="post.comments.empty"
        >
          Коментарів ще немає. Будьте першим!
        </p>
      </div>
    </div>
  </section>

  <!-- Tags section — hidden until tags are available -->
  <section
    class="section section--surface post-tags-section"
    id="post-tags-section"
    hidden
    aria-label="Теги"
  >
    <div class="page__container">
      <ul class="post-tags" id="post-tags" role="list">
        <!-- JS injects <li> tag items -->
      </ul>
    </div>
  </section>

  <!-- Sources section — hidden until sources are available; JS populates and reveals -->
  <section
    class="section section--dark post-sources-section"
    id="post-sources-section"
    hidden
    aria-label="Джерела"
  >
    <div class="page__container">
      <!-- Sources: heading — translated via data-i18n, mirrors post-comments__title pattern -->
      <h2 class="post-sources__title" data-i18n="post.sources_title">
        Джерела
      </h2>
      <!-- Sources: list — JS injects <li><a> items per source URL -->
      <ul class="post-sources" id="post-sources" role="list">
        <!-- JS injects source link items -->
      </ul>
    </div>
  </section>

  <!-- Not-found state — shown by JS when post is missing -->
  <section
    class="section section--dark post-not-found"
    id="post-not-found"
    hidden
    aria-label="Не знайдено"
  >
    <div class="page__container">
      <p class="post-not-found__msg" data-i18n="post.not_found">
        Статтю не знайдено.
      </p>
      <a href="blog.html" class="btn btn--cyan"
        ><span data-i18n="post.not_found.back">← Повернутись до блогу</span></a
      >
    </div>
  </section>
</main>
