<!doctype html>
<html lang="[[lang]]">
  <include
    src="@components/layout/head/head.html"
    locals='{
    "title":"[[title]]",
    "preloader":{"enable":"false","once":"false"},
    "keywords":"[[keywords]]",
    "description":"[[description]]"
  }'
  ></include>
  <script type="module" src="@components/templates/auth/auth.js"></script>
  <body class="auth-page">
    <div class="auth-wrapper">
      <!-- Logo -->
      <a href="/" class="auth-logo" aria-label="cote-lapyx — на головну">
        <img
          src="@img/logo/logo-cote-lapyx-geometric.png"
          alt="cote-lapyx"
          width="32"
          height="32"
        />
        <span>COTE-LAPYX</span>
      </a>

      <!-- Main content block -->
      <main class="auth-main">
        <block name="main"></block>
      </main>

      <!-- Footer -->
      <footer class="auth-footer">
        <p class="auth-footer__copy">&copy; 2024 cote-lapyx</p>
      </footer>
    </div>

    <script type="module" src="@js/app.js"></script>
    <script type="module" src="@js/auth.js"></script>
  </body>
</html>
